<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Background Map -->
  <div class="background-map"></div>

  <!-- SVG Overlay for Geolocation Line -->
  <svg id="map-overlay" class="map-overlay"></svg>

  <header>
    <h1>My Photography</h1>
    <p>Capturing moments</p>
  </header>

  <main>
    <div id="gallery" class="gallery"></div>
  </main>

  <!-- Fullscreen Viewer -->
  <div id="lightbox" class="lightbox">

    <!-- Close Button -->
    <span id="close">&times;</span>

    <!-- Main Layout -->
    <div class="lightbox-content">

      <!-- Image Viewer -->
      <div class="viewer">
        <img id="lightbox-img" alt="Expanded view" />
      </div>

      <!-- Side Info Panel -->
      <div id="side-panel" class="side-panel">
        <h2 id="img-title">Title</h2>
        <p id="img-location"></p>
        <p id="img-details"></p>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
